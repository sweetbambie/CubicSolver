<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CubicSolver</title>
  <link rel="stylesheet" href="src/style.css">
  <script src="src/script.ts"></script>
</head>
<body>
  <div class="main-layout">
    <div class="forms-column">
      <div class="container">
        <h1>Equation</h1>
        <p id="equation-display">
          y = ax³ + bx² + cx + d
        </p>
      </div>
      <div class="container">
        <h1>Cubic Solver</h1>
        <form id="cubic-form">
          <label for="a">a value:</label>
          <input type="number" id="a" name="a" required />
          <label for="b">b value:</label>
          <input type="number" id="b" name="b" required />
          <label for="c">c value:</label>
          <input type="number" id="c" name="c" required />
          <label for="d">d value:</label>
          <input type="number" id="d" name="d" required />
          <input type="submit" id="button" value="Calculate" />
        </form>
      </div>
      <div class="container">
        <h1>Results</h1>
        <div class="result-box">
          <p>Root 1: (<span id="x1-result"></span>, 0)</p>
          <p>Root 2: (<span id="x2-result"></span>, 0)</p>
          <p>Root 3: (<span id="x3-result"></span>, 0)</p>
          <p>p: <span id="p-result"></span></p>
          <p>q: <span id="q-result"></span></p>
          <p>Discriminant: <span id="discriminate"></span></p>
        </div>
      </div>
    </div>
    <div class="graph-container">
      <canvas id="graph" width="500" height="500"></canvas>
    </div>
  </div>
  <script type="module" src="/src/script.ts"></script>
</body>
