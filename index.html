<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CubicSolver</title>
  <link rel="stylesheet" href="src/style.css">
  <script src="src/script.ts"></script>
</head>

<body>
  <div class="main-layout">
    <div class="forms-column">
      <div class="container">
        <h1>Equation</h1>
        <p id="equation-display">
          y = ax³ + bx² + cx + d
        </p>
      </div>
      <div class="container">
        <h1>Cubic Solver</h1>
        <form id="cubic-form">
          <label for="a">a value:</label>
          <input type="number" id="a" name="a" required />
          <label for="b">b value:</label>
          <input type="number" id="b" name="b" required />
          <label for="c">c value:</label>
          <input type="number" id="c" name="c" required />
          <label for="d">d value:</label>
          <input type="number" id="d" name="d" required />
          <input type="submit" id="button" value="Calculate" />
        </form>
      </div>
      <div class="container">
        <h1>Results</h1>

        <div class="result-box">
          <table class="results-table">
            <tr>
              <td>p</td>
              <td id="p-result"></td>
            </tr>
            <tr>
              <td>q</td>
              <td id="q-result"></td>
            </tr>
            <tr>
              <td>Discriminant</td>
              <td id="discriminate"></td>
            </tr>
            <tr class="table-header">
              <td>Value</td>
              <td>x</td>
              <td>y</td>
            </tr>
            <tr>
              <td>Root 1</td>
              <td id="x1-result"></td>
              <td>0</td>
            </tr>
            <tr>
              <td>Root 2</td>
              <td id="x2-result"></td>
              <td>0</td>
            </tr>
            <tr>
              <td>Root 3</td>
              <td id="x3-result"></td>
              <td>0</td>
            </tr>
          </table>
        </div>
      </div>
    </div>
    
    <div class="graph-container">
        <canvas id="graph" width="600" height="600"></canvas>
      </div>
    <script type="module" src="/src/script.ts"></script>
</body>
