<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CubicSolver</title>
  <link rel="stylesheet" href="src/style.css">
  <script src="src/script.ts"></script>
</head>

<body>
  <div class="wrapper"> <!--  dont forget ur css idiot -->
    <div class="container">
      <h1>Cubic Solver</h1>
      <form id="cubic-form">
        <label for="a">a value:</label>
        <input type="number" id="a" name="a" required />
        <label for="b">b value:</label>
        <input type="number" id="b" name="b" required />
        <label for="c">c value:</label>
        <input type="number" id="c" name="c" required />
        <label for="d">d value:</label>
        <input type="number" id="d" name="d" required />
        <input type="submit" id="button" value="Calculate" />
        </form>
    </div>  
  
    <div class="container">
      <h1>Results</h1>
      <form id="result-form">
      <label for="x1">Root 1:</label>
      <input type="text" id="x1-result" readonly />

      <label for="x2">Root 2:</label>
      <input type="text" id="x2-result" readonly />

      <label for="x3">Root 3:</label>
      <input type="text" id="x3-result" readonly />

      <label for="p">p:</label>
      <input type="text" id="p-result" readonly />

      <label for="q">q:</label>
      <input type="text" id="q-result" readonly />

      <label for="discriminate">Discriminate:</label>
      <input type="text" id="discriminate" readonly />
    </form>
    </div>
  </div>
  <div>
    <canvas id="graph" width="600" height="600"></canvas>
  </div>
  <script type="module" src="/src/script.ts"></script>
</body>
